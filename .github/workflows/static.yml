# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main", "master"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  # Single deploy job since we're just deploying
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          # Tu dong bat GitHub Pages (build type: workflow) neu repo chua bat
          enablement: true

      # menu.tar.gz KHONG duoc commit trong repo - no duoc sinh o day tu thu muc menu/
      # de goi phan phoi luon khop voi ma nguon (truoc day phai nho dong goi tay,
      # quen mot lan la nguoi dung bam Update se nhan ban menu cu).
      - name: Build menu.tar.gz from menu/
        run: |
          set -euo pipefail
          test -d menu || { echo "::error::khong tim thay thu muc menu/"; exit 1; }
          rm -f menu.tar.gz
          # --format=gnu + --sort=name cho ket qua on dinh, LF giu nguyen tu repo
          tar --format=gnu --sort=name \
              --owner=0 --group=0 --numeric-owner \
              -czf menu.tar.gz menu
          # Liet ke ra FILE roi moi kiem tra. Neu dua thang qua ong vao "grep -q"
          # thi grep thoat ngay khi thay dong dau tien, tar bi dut ong (SIGPIPE)
          # va "set -o pipefail" coi ca pipeline la that bai — buoc nay bao loi
          # "thieu file" DU rang file co that.
          tar tzf menu.tar.gz > /tmp/pkg_list.txt
          echo "So file trong goi: $(grep -vc '/$' /tmp/pkg_list.txt)"
          grep -q 'menu/telegram_bot/bot.py' /tmp/pkg_list.txt \
            || { echo "::error::goi thieu file mong doi"; exit 1; }

      - name: Sanity check version file
        run: |
          set -euo pipefail
          grep -q '^script_version=' version || { echo "::error::version thieu script_version"; exit 1; }
          echo "Se phat hanh: $(grep '^script_version=' version)"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload entire repository
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
